services:
  backend:
    build: .
    image: lootradar-backend
    container_name: lootradar-backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development
    volumes:
      # Código fonte no host = live reload
      - .:/app
      # Manter node_modules do container (não sobrescrever com pasta vazia do host)
      - /app/node_modules
    stdin_open: true
    tty: true
