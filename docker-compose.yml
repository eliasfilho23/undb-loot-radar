networks:
  lootradar:
    name: lootradar

services:
  postgres:
    image: postgres:16-alpine
    container_name: lootradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lootradar
      POSTGRES_PASSWORD: lootradar
      POSTGRES_DB: lootradar
      PGPORT: 5433
    ports:
      - '5433:5433'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lootradar
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lootradar -d lootradar -p 5433']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: node:20-alpine
    container_name: lootradar-migrate
    profiles: [tools]
    working_dir: /app/backend
    environment:
      DATABASE_URL: postgresql://lootradar:lootradar@postgres:5433/lootradar
    volumes:
      - ./shared:/app/shared
      - ./backend:/app/backend
      - backend_nm:/app/backend/node_modules
    command: >
      sh -c "npm ci --silent && npm run drizzle:migrate"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lootradar
    restart: 'no'

volumes:
  pgdata:
  backend_nm:
